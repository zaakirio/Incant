# Incant — press-and-hold hotkeys for Hyprland
# Source this file in your ~/.config/hypr/bindings.conf:
#   source = ~/.config/hypr/incant.conf

# Press-and-hold: hold SUPER+Shift+D to start recording, release to stop and transcribe
bind  = SUPER SHIFT, D, exec, incant press
bindr = SUPER SHIFT, D, exec, incant release

# Cancel current recording/transcription with Escape
bind = , Escape, exec, incant cancel

# Double-tap lock mode: tap SUPER+Shift+D twice quickly to enter locked recording.
# Tap once more to stop. (Handled by the daemon — no extra Hyprland config needed.)
