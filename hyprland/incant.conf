# Incant — Hyprland bindings for voice dictation
# Source this file from ~/.config/hypr/hyprland.conf:
#   source = ~/.config/hypr/incant.conf
#
# Incant defaults to double-tap-only mode: a single tap never records —
# only an explicit double-tap (within 300 ms) does. This makes binding to a
# bare ALT modifier safe with Alt-Tab and friends.

# Double-tap ALT to record. A lone ALT (e.g. for Alt-Tab) does nothing.
bind  = ALT, , exec, incant press
bindr = ALT, , exec, incant release

# Cancel the current recording / transcription.
bind = , Escape, exec, incant cancel
