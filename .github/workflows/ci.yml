name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # gtk4-layer-shell is not packaged on Ubuntu LTSes — we build it
        # from source. This mirrors release.yml. See that file for the
        # full rationale.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            ninja-build \
            meson \
            pkg-config \
            libclang-dev \
            libgtk-4-dev \
            libwayland-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev

      - name: Build and install gtk4-layer-shell from source
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.0.4 \
            https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build \
            --prefix=/usr/local \
            --libdir=lib \
            -Dexamples=false -Ddocs=false -Dtests=false \
            -Dintrospection=false -Dvapi=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
          pkg-config --modversion gtk4-layer-shell-0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets
