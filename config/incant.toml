# Incant — Voice Dictation for Omarchy
# Config location: ~/.config/incant/config.toml

# Which STT model to load. Friendly names: "parakeet", "whisper", "moonshine".
# Use `incant model list` to see what's installed, and `incant model use <name>`
# to switch (downloads if needed, edits this field for you).
#
#   parakeet  — TDT 0.6B v3, 25 European languages, ~670 MB, fast (default)
#   whisper   — large-v3-turbo, 99 languages, ~3.4 GB, robust on mumbled speech
#   moonshine — Tiny, English only, ~120 MB, fastest
#
# model = "parakeet"
#
# Escape hatch: if you need to point at a model directory we don't know about,
# set `model_path` to an absolute path instead. `model` takes precedence.
# model_path = "/home/USER/.cache/incant/models/parakeet-tdt-0.6b-v3-int8"

# Sample rate the model expects (do not change unless you know what you're doing).
sample_rate = 16000

# Unix socket path for IPC between CLI and daemon.
# socket_path = "/run/user/1000/incant/daemon.sock"

# Audio capture buffer size in samples.
buffer_size = 4096

# Output method priority for text injection.
# wtype     = type directly into focused window (Wayland virtual_keyboard)
# dotool    = type via uinput (fallback)
# wl-copy   = copy to clipboard (last resort)
output_methods = ["wtype", "dotool", "wl-copy"]

# Show the GTK4 overlay HUD while recording/transcribing.
show_overlay = true

# ONNX inference threads (0 = auto).
num_threads = 4

# Enable debug logging and save last_recording.wav.
debug = false
